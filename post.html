<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Spearhead Companion Dev Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/post.css" />
</head>
<body class="post-page">

  <!-- NAV -->
  <nav class="site-nav">
    <a href="index.html" class="nav-brand">
      <span class="brand-icon">⚔</span>
      <span class="brand-text">Spearhead <em>Companion</em></span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">← All Posts</a>
    </div>
  </nav>

  <!-- POST CONTAINER -->
  <article class="post-article" id="post-article">
    <div class="loading-state full-page">
      <div class="loading-spinner"></div>
      <p>Loading post…</p>
    </div>
  </article>

  <!-- COMMENTS SECTION -->
  <section class="comments-section" id="comments-section">
    <div class="comments-inner">
      <div class="comments-header">
        <span class="comments-title">Discussion</span>
        <span class="comments-hint">Sign in with GitHub to join the conversation</span>
      </div>
      <div class="giscus"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="footer-inner">
      <a href="index.html" class="footer-back">← Back to Dev Log</a>
      <span class="footer-divider">·</span>
      <span>Spearhead Companion</span>
    </div>
  </footer>

  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/js/posts.js"></script>
  <script src="assets/js/post-reader.js"></script>

  <!--
    GISCUS COMMENTS
    ═══════════════════════════════════════════════════════
    Before this works you need two values from giscus.app:
      1. data-repo-id
      2. data-category-id

    HOW TO GET THEM (takes ~2 minutes):
      1. Go to https://giscus.app
      2. Under "Repository" enter: Amandaleeanne/AOSpearhead-companion-devlog
      3. Under "Discussion Category" select "General" (or create one called "Comments")
      4. Scroll to the bottom — copy data-repo-id and data-category-id from the generated script
      5. Paste them into the two placeholders below and delete this comment block

    Also make sure you have:
      • Discussions enabled on your repo (Settings → Features → Discussions ✓)
      • The giscus GitHub App installed on your repo (link on giscus.app)
    ═══════════════════════════════════════════════════════
  -->
  <script src="https://giscus.app/client.js"
    data-repo="Amandaleeanne/AOSpearhead-companion-devlog"
    data-repo-id="PASTE_REPO_ID_HERE"
    data-category="General"
    data-category-id="PASTE_CATEGORY_ID_HERE"
    data-mapping="og:title"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="dark"
    data-lang="en"
    data-loading="lazy"
    crossorigin="anonymous"
    async>
  </script>
</body>
</html>
